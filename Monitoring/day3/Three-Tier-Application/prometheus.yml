global:
  scrape_interval: 15s

scrape_configs:

  - job_name: "prometheus"
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]

  # 🔹 backend metrics (IMPORTANT → you must expose /metrics in Node app)
  - job_name: "backend"
    static_configs:
      - targets: ["node-backend:5000"]

